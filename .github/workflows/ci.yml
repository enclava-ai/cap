name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test Rust workspace
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libcryptsetup-dev clang libclang-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run fmt check
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run doctests
        run: cargo test --doc

  dependency-gates:
    name: Audit Rust dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo audit and cargo deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Run cargo audit
        # RUSTSEC-2023-0071 is transitive through jsonwebtoken/sigstore and has
        # no fixed upstream release. cargo-deny records the same exception with
        # rationale in deny.toml.
        run: cargo audit --ignore RUSTSEC-2023-0071

      - name: Run cargo deny
        run: cargo deny check advisories sources

  build:
    name: Build all crates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libcryptsetup-dev clang libclang-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace
        run: cargo build --workspace

      - name: Build release bins
        run: |
          cargo build --release --bin enclava-api
          cargo build --release --bin enclava

      - name: Build prod-strict release path
        run: |
          cargo build --release -p enclava-common --features prod-strict
          cargo build --release -p enclava-engine --features prod-strict
          cargo build --release -p enclava-api --features prod-strict
          cargo build --release -p enclava-cli --features prod-strict
          cargo build --release -p enclava-init --features prod-strict

      - name: Verify prod-strict rejects debug-only features
        run: |
          if cargo check --release -p enclava-engine --features prod-strict,testutil; then
            echo "enclava-engine prod-strict unexpectedly accepted testutil"
            exit 1
          fi
          if cargo check --release -p enclava-init --features prod-strict,luks-integration; then
            echo "enclava-init prod-strict unexpectedly accepted luks-integration"
            exit 1
          fi

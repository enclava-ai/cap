name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-linux:
    name: Build Linux binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: linux
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            os: linux
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: |
          cargo build --release --bin enclava --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/enclava

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf enclava-${{ matrix.os }}-${{ matrix.arch }}.tar.gz enclava

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enclava-${{ matrix.os }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/enclava-*.tar.gz

  build-macos:
    name: Build macOS binaries
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos
            arch: x86_64
          - target: aarch64-apple-darwin
            os: macos
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: |
          cargo build --release --bin enclava --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf enclava-${{ matrix.os }}-${{ matrix.arch }}.tar.gz enclava

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enclava-${{ matrix.os }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/enclava-*.tar.gz

  release:
    name: Create GitHub release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum */*.tar.gz > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*/*.tar.gz
            artifacts/SHA256SUMS.txt
          generate_release_notes: true

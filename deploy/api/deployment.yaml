apiVersion: apps/v1
kind: Deployment
metadata:
  name: enclava-api
  namespace: enclava-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enclava-api
  template:
    metadata:
      labels:
        app: enclava-api
    spec:
      containers:
      - name: api
        image: ghcr.io/enclava-ai/enclava-api:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: database-url
        - name: API_URL
          value: "https://api.enclava.dev"
        - name: PLATFORM_DOMAIN
          value: "enclava.dev"
        - name: DNS_MANAGEMENT_REQUIRED
          value: "true"
        - name: CLOUDFLARE_ZONE_NAME
          value: "enclava.dev"
        - name: CLOUDFLARE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: cloudflare-api-token
        - name: TENANT_DNS_TARGET
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: tenant-dns-target
        - name: BTCPAY_URL
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: btcpay-url
        - name: BTCPAY_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: btcpay-api-key
        - name: BTCPAY_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: btcpay-webhook-secret
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
      imagePullSecrets:
      - name: ghcr-login

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: enclava-api
  namespace: enclava-platform
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.enclava.dev
    secretName: api-tls
  rules:
  - host: api.enclava.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: enclava-api
            port:
              number: 80

apiVersion: kustomize.config.k8s.io/v1
kind: Kustomization

namespace: enclava-platform

resources:
- namespace.yaml
- deployment.yaml
- service.yaml
- ingress.yaml

images:
- name: ghcr.io/enclava-ai/enclava-api
  newTag: "v1.0.0"

# NOTE: These are placeholder values. Override using:
# - kustomize edit set secret api-secrets --from-literal=database-url="..."
# - Or create a SealedSecret/ExternalSecret for production
secretGenerator:
- name: api-secrets
  type: Opaque
  literals:
  - database-url="postgresql://user:pass@host:5432/db"
  - btcpay-url="http://btcpay:23001"
  - btcpay-api-key="placeholder"
  - btcpay-webhook-secret="placeholder"
